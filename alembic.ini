# Alembic migration script template
# Generic single-database configuration with async support.

[alembic]
script_location = app/db/migrations
prepend_sys_path = .
version_path_separator = os

# Async engine DSN — overridden by env.py from Settings
# Do NOT put real credentials here; use .env instead
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/xlventures

[post_write_hooks]
# Uncomment to auto-format generated migrations with black:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
